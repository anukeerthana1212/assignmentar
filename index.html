<!DOCTYPE html>
<html>

<head>
  <title>Markerless AR - Deer Model</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
</head>

<body style="margin:0; overflow:hidden;">

<a-scene
  xr-mode-ui="enabled: true"
  webxr="requiredFeatures: hit-test, local-floor"
  renderer="colorManagement: true;"
>

  <!-- Camera -->
  <a-camera position="0 1.6 0"></a-camera>

  <!-- Light -->
  <a-light type="directional" intensity="1" position="1 3 2"></a-light>
  <a-light type="ambient" intensity="0.5"></a-light>

  <!-- Reticle (for placement) -->
  <a-entity
    id="reticle"
    geometry="primitive: ring; radiusInner: 0.05; radiusOuter: 0.06"
    material="color: green"
    rotation="-90 0 0"
    visible="false">
  </a-entity>

  <!-- Model (initially hidden) -->
  <a-entity
    id="model"
    gltf-model="deer_statue_stylized.glb"
    scale="0.2 0.2 0.2"
    visible="false">
  </a-entity>

</a-scene>

<script>
let scene = document.querySelector("a-scene");
let reticle = document.querySelector("#reticle");
let model = document.querySelector("#model");

scene.addEventListener("enter-vr", () => {
  let xrSession = scene.renderer.xr.getSession();

  xrSession.requestReferenceSpace("viewer").then((space) => {
    xrSession.requestHitTestSource({ space }).then((source) => {

      scene.frame = (time, frame) => {
        let refSpace = scene.renderer.xr.getReferenceSpace();
        let hits = frame.getHitTestResults(source);

        if (hits.length > 0) {
          let pose = hits[0].getPose(refSpace);

          reticle.setAttribute("visible", true);
          reticle.setAttribute("position", {
            x: pose.transform.position.x,
            y: pose.transform.position.y,
            z: pose.transform.position.z
          });
        }
      };
    });
  });
});

// Tap to place model
window.addEventListener("click", () => {
  if (reticle.getAttribute("visible")) {
    model.setAttribute("visible", true);
    model.setAttribute("position", reticle.getAttribute("position"));
  }
});
</script>

</body>
</html>
