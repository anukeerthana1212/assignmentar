<!DOCTYPE html>
<html>
<head>
    <title>Web VR Assignment - Robot Lab</title>

    <!-- A-Frame -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
</head>

<body>

<a-scene>

    <!-- 📦 Assets -->
    <a-assets>
        <a-asset-item id="model1" src="model1.glb"></a-asset-item>
        <a-asset-item id="model2" src="model2.glb"></a-asset-item>
    </a-assets>

    <!-- 🎥 Camera -->
    <a-entity position="0 1.6 6">
        <a-camera wasd-controls look-controls>
            <a-cursor color="yellow"></a-cursor>
        </a-camera>
    </a-entity>

    <!-- 🧱 FLOOR -->
    <a-plane 
        position="0 0 0" 
        rotation="-90 0 0" 
        width="20" 
        height="20" 
        color="#1a1a1a">
    </a-plane>

    <!-- 🧱 BACK WALL -->
    <a-plane 
        position="0 3 -10" 
        width="20" 
        height="6" 
        color="#111">
    </a-plane>

    <!-- 🧱 LEFT WALL -->
    <a-plane 
        position="-10 3 0" 
        rotation="0 90 0" 
        width="20" 
        height="6" 
        color="#0d0d0d">
    </a-plane>

    <!-- 🧱 RIGHT WALL -->
    <a-plane 
        position="10 3 0" 
        rotation="0 -90 0" 
        width="20" 
        height="6" 
        color="#0d0d0d">
    </a-plane>

    <!-- 💡 CEILING LIGHT -->
    <a-entity 
        light="type: point; intensity: 2; distance: 20" 
        position="0 5 0">
    </a-entity>

    <!-- 💡 AMBIENT LIGHT -->
    <a-entity light="type: ambient; intensity: 0.5"></a-entity>

    <!-- 🔷 GLOW PANELS (lab feel) -->
    <a-plane position="-5 2 -9.9" width="3" height="2" color="#00f0ff" opacity="0.7"></a-plane>
    <a-plane position="5 2 -9.9" width="3" height="2" color="#00f0ff" opacity="0.7"></a-plane>

    <!-- 🧍 MODEL 1 -->
    <a-entity 
        gltf-model="#model1"
        position="-2 0 -5"
        scale="0.6 0.6 0.6"
        onclick="model1Click()">
    </a-entity>

    <!-- 🧍 MODEL 2 -->
    <a-entity 
        gltf-model="#model2"
        position="2 0 -6"
        scale="0.3 0.3 0.3"
        onclick="model2Click()">
    </a-entity>

    <!-- 🌌 SKY (dark indoor feel) -->
    <a-sky color="#000000"></a-sky>

</a-scene>

<!-- 🔊 Interaction Script -->
<script>
function model1Click() {
    alert("Robot 1 Activated!");
}

function model2Click() {
    alert("Robot 2 Activated!");
}
</script>

</body>
</html>
