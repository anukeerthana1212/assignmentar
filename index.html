<!DOCTYPE html>
<html>
<head>
    <title>Web VR Assignment - Multiple 3D Models</title>

    <!-- A-Frame -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

    <!-- Environment -->
    <script src="https://unpkg.com/aframe-environment-component/dist/aframe-environment-component.min.js"></script>
</head>

<body>

<a-scene>

    <!-- 🌌 Futuristic Environment -->
    <a-entity environment="preset: tron; dressingAmount: 50; groundColor: #111; grid: cross"></a-entity>

    <!-- 📦 Assets -->
    <a-assets>
        <a-asset-item id="model1" src="model1.glb"></a-asset-item>
        <a-asset-item id="model2" src="model2.glb"></a-asset-item>
    </a-assets>

    <!-- 🎥 Camera -->
    <a-entity position="0 1.6 5">
        <a-camera wasd-controls look-controls>
            <a-cursor color="yellow"></a-cursor>
        </a-camera>
    </a-entity>

    <!-- 🧍 MODEL 1 -->
    <a-entity 
        gltf-model="#model1"
        position="-2 0 -5"
        scale="0.6 0.6 0.6"
        onclick="model1Click()">
    </a-entity>

    <!-- 🧍 MODEL 2 -->
    <a-entity 
        gltf-model="#model2"
        position="2 0 -10"
        scale="0.3 0.3 0.3"
        onclick="model2Click()">
    </a-entity>

    <!-- 💡 Lighting for metallic look -->
    <a-entity light="type: ambient; intensity: 0.5"></a-entity>
    <a-entity light="type: point; intensity: 1.5; position: 2 4 2"></a-entity>

    <!-- 🌌 Sky -->
    <a-sky color="#000814"></a-sky>

</a-scene>

<!-- 🔊 Interaction Script -->
<script>
function model1Click() {
    alert("Model 1 Clicked!");
}

function model2Click() {
    alert("Model 2 Clicked!");
}
</script>

</body>
</html>
